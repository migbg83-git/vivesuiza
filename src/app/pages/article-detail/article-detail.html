<main class="container py-5">
  <a routerLink="/" class="text-decoration-none small">← Volver al inicio</a>

  @if (article$ | async; as article) {
    <article class="mt-4" style="max-width: 760px;">
      <p class="text-uppercase small text-muted">{{ article.category }}</p>
      <h1>{{ article.title }}</h1>
      <p class="lead">{{ article.description }}</p>

      <hr class="my-4" />

      <div class="article-content" [innerHTML]="article.html"></div>
    </article>
  } @else {
    <section class="mt-4">
      <h1>Artículo no encontrado</h1>
      <p>No hemos encontrado el artículo solicitado.</p>
    </section>
  }
</main>
